name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FOUNDRY_PROFILE: ci

jobs:
  build-and-test:
    name: build · fmt · test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show forge version
        run: forge --version

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv

      - name: Coverage (informational)
        # Coverage is informational on every push; the 100% line / 95% branch gate is enforced
        # in a follow-up job once we lock in lcov tooling. We still want a coverage signal in
        # every PR so reviewers can see whether new code has been exercised.
        run: forge coverage --report summary --no-match-coverage "test/.*|script/.*"
        continue-on-error: true

  slither:
    name: static analysis · slither
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Show forge version
        run: forge --version

      # slither-action runs inside a Docker container that does not have forge on
      # its PATH, so it cannot drive the Foundry build itself. Compile here on the
      # host (where foundry-toolchain installed forge) and emit build-info JSON so
      # Slither can consume the pre-built artifacts via `ignore-compile`.
      - name: Build (with build-info for Slither)
        run: forge build --build-info

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: high
          slither-config: slither.config.json
          target: "src/"
          ignore-compile: true
